<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ManooFX — Trade Smarter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=DM+Mono:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>
  :root{--bg:#080c10;--surface:#0e1318;--border:#1a2330;--accent:#00e5b4;--text:#e8edf2;--muted:#5a6a7a;--card:#111820;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:\'DM Mono\',monospace;min-height:100vh;overflow-x:hidden;}
  .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center;}
  h1{font-family:\'Syne\',sans-serif;font-size:clamp(2.5rem,8vw,5rem);font-weight:800;line-height:1.1;margin-bottom:20px;}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px;}
  .btn-deriv{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:16px;background:var(--accent);color:#000;border:none;border-radius:12px;font-family:\'Syne\',sans-serif;font-weight:700;cursor:pointer;font-size:1rem;}
  .btn-deriv:hover{background:#00ffca;transform:translateY(-2px);}
  .btn-clear{margin-top:20px;background:none;border:none;color:var(--muted);font-size:0.7rem;cursor:pointer;text-decoration:underline;}
</style>
</head>
<body>
<section class="hero">
  <div class="logo" style="font-family:\'Syne\'; font-weight:800; font-size:2rem; margin-bottom:40px;">Manoo<span>FX</span></div>
  <h1>Trade Deriv<br><span style="color:var(--accent)">Smarter.</span></h1>
  <div class="login-card">
    <h2 style="margin-bottom:10px; font-family:\'Syne\'">Connect Account</h2>
    <p style="color:var(--muted); font-size:0.8rem; margin-bottom:30px;">Direct connection to Deriv. No backend required.</p>
    <button class="btn-deriv" id="loginBtn" onclick="startLogin()">Login with Deriv</button>
    <button class="btn-clear" onclick="clearSession()">Clear Local Session</button>
  </div>
</section>

<script>
// Only redirect if we have a valid active session
if (localStorage.getItem(\'mfx_active\')) {
  window.location.href = \'dashboard.html\';
}

const CLIENT_ID = \'33scAN1TBU9sHqZPKckm9\';

function startLogin() {
  const btn = document.getElementById(\'loginBtn\');
  btn.textContent = \'Redirecting...\';
  btn.disabled = true;

  // The most direct OAuth URL for Deriv
  const loginUrl = `https://oauth.deriv.com/oauth2/authorize?app_id=${CLIENT_ID}&l=EN&brand=deriv`;
  
  console.log("Redirecting to:", loginUrl);
  window.location.href = loginUrl;
}

function clearSession() {
  localStorage.clear();
  sessionStorage.clear();
  alert("Local session cleared. Try logging in again.");
  window.location.reload();
}
</script>
</body></html>
