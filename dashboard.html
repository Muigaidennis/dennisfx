<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ManooFX — Dashboard</title>
<link rel="stylesheet" href="shared.css">
<script src="shared.js"></script>
<style>
  :root { --bg: #080c10; --surface: #0e1318; --border: #1a2330; --accent: #00e5b4; --text: #e8edf2; --muted: #5a6a7a; --card: #111820; --danger: #ff4060; --radius: 12px; --font-display: \'Syne\', sans-serif; --font-mono: \'DM Mono\', monospace; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); margin: 0; padding: 0; }
  .mfx-layout { padding: 20px; max-width: 1200px; margin: 0 auto; padding-bottom: 80px; }
  .mfx-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  .stat-val { font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
  .up { color: var(--accent); } .dn { color: var(--danger); }
  .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; }
  .tag-green { background: rgba(0,229,180,0.1); color: var(--accent); }
  .tag-blue { background: rgba(0,119,255,0.1); color: #0077ff; }
  .acc-pill { background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 10px; cursor: pointer; min-width: 150px; flex-shrink: 0; transition: all 0.2s; }
  .acc-pill.active { border-color: var(--accent); background: rgba(0,229,180,0.05); box-shadow: 0 0 15px rgba(0,229,180,0.1); }
  .accs-row { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 15px 0; scrollbar-width: none; }
  .accs-row::-webkit-scrollbar { display: none; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px; z-index: 100; }
  .bottom-nav a { color: var(--muted); text-decoration: none; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bottom-nav a.active { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<div id="navHolder"></div>
<div class="mfx-layout">
  <div id="sidebarHolder"></div>
  <main>
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
      <div>
        <h1 style="font-family:var(--font-display); margin:0; font-size:1.5rem;">Dashboard</h1>
        <div id="serverTime" style="font-size:0.65rem; color:var(--muted);">Connecting...</div>
      </div>
      <div class="tag tag-green">LIVE</div>
    </header>

    <div class="mfx-card" style="background:linear-gradient(135deg, rgba(0,229,180,0.08), transparent); border-color: rgba(0,229,180,0.2);">
      <div class="stat-label">Active Balance</div>
      <div style="display:flex; align-items:baseline; gap:8px; margin:10px 0;">
        <span class="stat-val" id="mainBalance">—</span>
        <span id="mainCurrency" style="color:var(--muted); font-weight:700;"></span>
      </div>
      <div id="accTypeTag"></div>
      
      <div style="margin-top:25px;">
        <div class="stat-label" style="margin-bottom:10px;">Switch Account</div>
        <div class="accs-row" id="accsList"></div>
      </div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
      <div class="mfx-card">
        <div class="stat-label">Open Contracts</div>
        <div class="stat-val" id="openCount">0</div>
      </div>
      <div class="mfx-card">
        <div class="stat-label">Today P&L</div>
        <div class="stat-val" id="todayPnl">—</div>
      </div>
    </div>

    <div class="mfx-card">
      <div class="stat-label" style="margin-bottom:15px;">Market Snapshot</div>
      <div id="marketSnap"></div>
    </div>
  </main>
</div>
<div id="bottomNavHolder"></div>

<script>
const active = requireAuth();
const ws = new DerivWS();

// Build UI Components
document.getElementById(\'navHolder\').innerHTML = buildNav(\'dashboard\');
document.getElementById(\'bottomNavHolder\').innerHTML = buildBottomNav(\'dashboard\');

ws.on(\'authorize\', (data) => {
  if (data.error) { toast(\'Auth failed: \' + data.error.message, \'error\'); return; }
  
  // 1. Fetch balance for ALL accounts to show in switcher
  ws.send({ balance: 1, account: \'all\' });
  
  // 2. Subscribe to balance updates for ALL accounts
  ws.subscribe({ balance: 1, account: \'all\' });
  
  // 3. Get portfolio for open contracts
  ws.send({ portfolio: 1 });
  
  // 4. Subscribe to open contract updates for P&L
  ws.subscribe({ proposal_open_contract: 1 });
  
  // 5. Load market data
  loadMarketSnap();
  
  // 6. Start server time
  ws.send({ time: 1 });
});

ws.on(\'balance\', (data) => {
  if (data.balance) updateBalances(data.balance);
});

ws.on(\'portfolio\', (data) => {
  const count = data.portfolio?.contracts?.length || 0;
  document.getElementById(\'openCount\').textContent = count;
});

ws.on(\'proposal_open_contract\', (data) => {
  const c = data.proposal_open_contract;
  if (c) {
    document.getElementById(\'todayPnl\').textContent = (c.profit >= 0 ? \'+\' : \'\') + fmt(c.profit);
    document.getElementById(\'todayPnl\').className = \'stat-val \' + (c.profit >= 0 ? \'up\' : \'dn\');
  }
});

ws.on(\'time\', (data) => {
  document.getElementById(\'serverTime\').textContent = new Date(data.time * 1000).toUTCString().slice(5, 25) + \' UTC\';
});

function updateBalances(balance) {
  const accounts = getAccounts();
  const activeAcc = getActive();
  
  // Update main display for active account
  const activeBalData = balance.accounts?.[activeAcc.account];
  if (activeBalData) {
    document.getElementById(\'mainBalance\').textContent = fmt(activeBalData.balance);
    document.getElementById(\'mainCurrency\').textContent = activeBalData.currency;
    const isDemo = activeAcc.account.startsWith(\'VRTC\');
    document.getElementById(\'accTypeTag\').innerHTML = `<span class="tag ${isDemo?\'tag-blue\':\'tag-green\'}">${isDemo?\'🔵 Demo Account\':\'🟢 Real Account\'}</span>`;
  }

  // Update the account switcher list
  const list = document.getElementById(\'accsList\');
  list.innerHTML = accounts.map(a => {
    const isCurr = a.account === activeAcc.account;
    const balInfo = balance.accounts?.[a.account];
    const balVal = balInfo ? balInfo.balance : \'—\';
    const isDemo = a.account.startsWith(\'VRTC\');
    
    return `<div class="acc-pill ${isCurr?\'active\':\'\'}" onclick="switchAccount(\'${a.account}\')">
      <div style="font-size:0.6rem; color:var(--muted); margin-bottom:4px;">${isDemo?\'DEMO\':\'REAL\'} · ${a.account}</div>
      <div style="font-weight:700; font-size:0.9rem;">${fmt(balVal)} <span style="font-size:0.7rem; color:var(--muted);">${a.currency||\'USD\'}</span></div>
    </div>`;
  }).join(\'\');
}

async function loadMarketSnap() {
  const syms = [\'R_10\', \'R_25\', \'R_50\', \'R_100\', \'1HZ10V\', \'1HZ100V\'];
  const snapEl = document.getElementById(\'marketSnap\');
  snapEl.innerHTML = syms.map(s => `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);">
    <span style="color:var(--muted); font-size:0.75rem;">${s}</span>
    <span id="snap_${s}" style="font-weight:700; font-size:0.85rem;">—</span>
  </div>`).join(\'\');

  syms.forEach(sym => {
    ws.subscribe({ ticks: sym }, d => {
      if (d.tick) {
        const el = document.getElementById(\'snap_\' + sym);
        if (el) el.textContent = fmt(d.tick.quote, 3);
      }
    });
  });
}

// Initialize connection
ws.connect(active.token);
setInterval(() => ws.send({ time: 1 }), 30000);
</script>
</body></html>
