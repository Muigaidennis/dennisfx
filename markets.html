<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ManooFX — Live Markets</title>
<link rel="stylesheet" href="shared.css"/>
<script src="shared.js"></script>
<style>
  .market-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .market-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all 0.2s;}
  .market-card.selected{border-color:var(--accent);background:rgba(0,229,180,0.04);}
  .mc-name{font-family:var(--font-display);font-size:0.8rem;font-weight:700;}
  .mc-sym{font-size:0.58rem;color:var(--muted);margin-top:2px;}
  .mc-price{font-family:var(--font-display);font-size:1.2rem;font-weight:800;margin-top:8px;}
  .mc-change{font-size:0.65rem;margin-top:3px;}
  .mc-sparkline{height:36px;width:100%;margin-top:8px;}
  .detail-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px;display:none;}
  .detail-panel.open{display:block;}
  .detail-price{font-family:var(--font-display);font-size:1.8rem;font-weight:800;}
  #tickChart{height:180px;width:100%;display:block;}
  .tick-table-wrap{max-height:160px;overflow-y:auto;margin-top:12px;}
  .section-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;}
  .sec-tab{padding:6px 12px;border-radius:100px;font-size:0.65rem;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:none;font-family:var(--font-mono);white-space:nowrap;}
  .sec-tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
  @media(min-width:768px){.market-grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<div id="navHolder"></div>
<div class="mfx-layout">
  <div id="sidebarHolder"></div>
  <main class="mfx-main">
    <div class="page-header">
      <div><div class="page-title">Live Markets</div><div class="page-sub">Real-time Volatility Indices</div></div>
      <div class="live-dot">Streaming</div>
    </div>
    <div class="section-tabs">
      <button class="sec-tab active" onclick="filterGroup('all',this)">All</button>
      <button class="sec-tab" onclick="filterGroup('standard',this)">Standard</button>
      <button class="sec-tab" onclick="filterGroup('1s',this)">1-Second</button>
    </div>
    <div class="market-grid" id="marketGrid"></div>
    <div class="detail-panel" id="detailPanel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-family:var(--font-display);font-size:1rem;font-weight:800;" id="dtName">-</div>
          <div style="font-size:0.65rem;color:var(--muted);" id="dtSym">-</div>
        </div>
        <div style="text-align:right;">
          <div class="detail-price" id="dtPrice">-</div>
          <div id="dtChange" style="font-size:0.72rem;margin-top:2px;">-</div>
        </div>
        <button class="btn btn-secondary" style="padding:6px 12px;font-size:0.68rem;" onclick="closeDetail()">Close</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
        <div class="mfx-card" style="padding:12px;"><div class="stat-label">High</div><div class="stat-val" style="font-size:1rem;" id="dtHigh">-</div></div>
        <div class="mfx-card" style="padding:12px;"><div class="stat-label">Low</div><div class="stat-val" style="font-size:1rem;" id="dtLow">-</div></div>
        <div class="mfx-card" style="padding:12px;"><div class="stat-label">Pip Size</div><div class="stat-val" style="font-size:1rem;" id="dtPip">-</div></div>
        <div class="mfx-card" style="padding:12px;"><div class="stat-label">Ticks</div><div class="stat-val" style="font-size:1rem;" id="dtCount">0</div></div>
      </div>
      <canvas id="tickChart"></canvas>
      <div class="tick-table-wrap">
        <table class="mfx-table">
          <thead><tr><th>#</th><th>Price</th><th>Change</th><th>Time</th></tr></thead>
          <tbody id="tickTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="bottomNavHolder"></div>
<script>
const active=requireAuth();
document.getElementById("navHolder").innerHTML=buildNav("markets");
document.getElementById("sidebarHolder").innerHTML=buildSidebar("markets");
document.getElementById("bottomNavHolder").innerHTML=buildBottomNav("markets");
const SYMBOLS=[
  {sym:"R_10",name:"Volatility 10",group:"standard"},{sym:"R_25",name:"Volatility 25",group:"standard"},
  {sym:"R_50",name:"Volatility 50",group:"standard"},{sym:"R_75",name:"Volatility 75",group:"standard"},
  {sym:"R_100",name:"Volatility 100",group:"standard"},{sym:"1HZ10V",name:"Vol 10 (1s)",group:"1s"},
  {sym:"1HZ25V",name:"Vol 25 (1s)",group:"1s"},{sym:"1HZ50V",name:"Vol 50 (1s)",group:"1s"},
  {sym:"1HZ75V",name:"Vol 75 (1s)",group:"1s"},{sym:"1HZ100V",name:"Vol 100 (1s)",group:"1s"},
];
const state={};
SYMBOLS.forEach(s=>{state[s.sym]={prices:[],prevPrice:null,high:null,low:null,count:0};});
let selectedSym=null,tickRows=[],currentGroup="all",detailPrices=[];
function buildCards(){
  const grid=document.getElementById("marketGrid");
  grid.innerHTML=SYMBOLS.filter(s=>currentGroup==="all"||s.group===currentGroup).map(s=>`
    <div class="market-card" id="card_${s.sym}" onclick="selectSymbol('${s.sym}','${s.name}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div><div class="mc-name">${s.name}</div><div class="mc-sym">${s.sym}</div></div>
        <span class="tag ${s.group==="1s"?"tag-blue":"tag-green"}">${s.group==="1s"?"1s":"Std"}</span>
      </div>
      <div class="mc-price" id="price_${s.sym}">-</div>
      <div class="mc-change" id="chg_${s.sym}"><span style="color:var(--muted)">Connecting...</span></div>
      <canvas class="mc-sparkline" id="spark_${s.sym}"></canvas>
    </div>`).join("");
}
buildCards();
const ws=new DerivWS();
ws.connect(active.token);
ws.on("authorize",()=>{
  SYMBOLS.forEach(s=>{
    ws.subscribe({ticks:s.sym},d=>{
      if(!d.tick)return;
      const tick=d.tick,st=state[s.sym],prev=st.prevPrice;
      st.prices.push(tick.quote);if(st.prices.length>60)st.prices.shift();
      if(st.high===null||tick.quote>st.high)st.high=tick.quote;
      if(st.low===null||tick.quote<st.low)st.low=tick.quote;
      st.count++;
      const pe=document.getElementById("price_"+s.sym);
      const ce=document.getElementById("chg_"+s.sym);
      if(pe){pe.textContent=fmt(tick.quote,3);pe.style.color=prev===null?"var(--text)":tick.quote>prev?"var(--accent)":tick.quote<prev?"var(--danger)":"var(--text)";}
      if(ce&&prev!==null){const diff=tick.quote-prev;ce.innerHTML=`<span class="${diff>=0?"up":"dn"}">${diff>=0?"▲":"▼"} ${Math.abs(diff).toFixed(3)}</span>`;}
      st.prevPrice=tick.quote;drawSparkline(s.sym);
      if(selectedSym===s.sym)updateDetail(tick,s.sym);
    });
  });
});
function drawSparkline(sym){
  const canvas=document.getElementById("spark_"+sym);if(!canvas)return;
  const prices=state[sym].prices;if(prices.length<2)return;
  const ctx=canvas.getContext("2d");const w=canvas.offsetWidth;const h=36;
  canvas.width=w;canvas.height=h;
  const min=Math.min(...prices),max=Math.max(...prices),range=max-min||1;
  ctx.clearRect(0,0,w,h);
  const color=prices[prices.length-1]>=prices[0]?"#00e5b4":"#ff4060";
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.beginPath();
  prices.forEach((p,i)=>{const x=(i/(prices.length-1))*w;const y=h-((p-min)/range)*h;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
  const grad=ctx.createLinearGradient(0,0,0,h);grad.addColorStop(0,color+"30");grad.addColorStop(1,color+"00");
  ctx.fillStyle=grad;ctx.fill();
}
function selectSymbol(sym,name){
  selectedSym=sym;
  document.querySelectorAll(".market-card").forEach(c=>c.classList.remove("selected"));
  document.getElementById("card_"+sym)?.classList.add("selected");
  const panel=document.getElementById("detailPanel");panel.classList.add("open");
  document.getElementById("dtName").textContent=name;document.getElementById("dtSym").textContent=sym;
  detailPrices=[...state[sym].prices];tickRows=[];document.getElementById("tickTableBody").innerHTML="";
  panel.scrollIntoView({behavior:"smooth",block:"start"});
}
function closeDetail(){selectedSym=null;document.getElementById("detailPanel").classList.remove("open");document.querySelectorAll(".market-card").forEach(c=>c.classList.remove("selected"));}
function updateDetail(tick,sym){
  const st=state[sym];
  document.getElementById("dtPrice").textContent=fmt(tick.quote,4);
  document.getElementById("dtHigh").textContent=fmt(st.high,4);
  document.getElementById("dtLow").textContent=fmt(st.low,4);
  document.getElementById("dtPip").textContent=tick.pip_size||"-";
  document.getElementById("dtCount").textContent=st.count;
  detailPrices.push(tick.quote);if(detailPrices.length>100)detailPrices.shift();
  drawDetailChart();
  const tbody=document.getElementById("tickTableBody");
  const prev=tickRows.length>0?tickRows[0].quote:tick.quote;const diff=tick.quote-prev;
  tickRows.unshift({quote:tick.quote,diff,time:new Date(tick.epoch*1000)});if(tickRows.length>30)tickRows.pop();
  tbody.innerHTML=tickRows.map((r,i)=>`<tr><td style="color:var(--muted)">${tickRows.length-i}</td><td style="font-family:var(--font-display);font-weight:600">${fmt(r.quote,4)}</td><td class="${r.diff>=0?"up":"dn"}">${r.diff>=0?"+":""}${r.diff.toFixed(4)}</td><td style="color:var(--muted);font-size:0.62rem">${r.time.toLocaleTimeString()}</td></tr>`).join("");
}
function drawDetailChart(){
  const canvas=document.getElementById("tickChart");const prices=detailPrices;if(prices.length<2)return;
  const w=canvas.offsetWidth;const h=180;canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext("2d");const min=Math.min(...prices)*0.9999;const max=Math.max(...prices)*1.0001;const range=max-min||0.001;
  ctx.clearRect(0,0,w,h);
  for(let i=0;i<=4;i++){const y=(i/4)*h;ctx.strokeStyle="#1a2330";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();ctx.fillStyle="#5a6a7a";ctx.font="9px DM Mono";ctx.fillText(fmt(max-(i/4)*range,3),4,y+10);}
  const color=prices[prices.length-1]>=prices[0]?"#00e5b4":"#ff4060";
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();
  prices.forEach((p,i)=>{const x=(i/(prices.length-1))*w;const y=h-((p-min)/range)*(h-20)-5;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
  const grad=ctx.createLinearGradient(0,0,0,h);grad.addColorStop(0,color+"25");grad.addColorStop(1,"transparent");
  ctx.fillStyle=grad;ctx.fill();
}
function filterGroup(g,btn){currentGroup=g;document.querySelectorAll(".sec-tab").forEach(b=>b.classList.remove("active"));btn.classList.add("active");buildCards();}
</script>
</body>
</html>
