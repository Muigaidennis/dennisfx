<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ManooFX — 404</title>
<link rel="stylesheet" href="shared.css"/>
<script src="shared.js"></script>
</head>
<body>
<div id="navHolder"></div>
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);flex-direction:column;gap:16px;text-align:center;">
  <div style="font-size:5rem;font-family:var(--font-display);font-weight:800;color:var(--border);">404</div>
  <div style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;">Page Not Found</div>
  <div style="color:var(--muted);font-size:0.78rem;">The page you're looking for doesn't exist.</div>
  <a href="dashboard.html" class="btn btn-primary" style="margin-top:8px;text-decoration:none;">← Back to Dashboard</a>
</div>
<script>
  const a = localStorage.getItem('mfx_active');
  if(a) document.getElementById('navHolder').innerHTML = buildNav('');
</script>
</body>
</html>
