<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ManooFX — Trade History</title>
<link rel="stylesheet" href="shared.css"/>
<script src="shared.js"></script>
<style>
  .filter-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-row .field-group { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
  .stat-chips { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 20px; }
  .stat-chip {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .stat-chip .val { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; margin-top: 4px; }
  .statement-wrap { overflow-x: auto; }

  .win-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .win-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s; }
</style>
</head>
<body>
<div id="navHolder"></div>
<div class="mfx-layout">
  <div id="sidebarHolder"></div>
  <main class="mfx-main">
    <div class="page-header">
      <div>
        <div class="page-title">Trade History</div>
        <div class="page-sub">Statement, profit/loss, and analytics</div>
      </div>
    </div>

    <!-- Summary chips -->
    <div class="stat-chips" id="statChips">
      <div class="stat-chip"><div class="mfx-card-title">Total Trades</div><div class="val" id="stTotal">—</div></div>
      <div class="stat-chip"><div class="mfx-card-title">Total Stake</div><div class="val" id="stStake">—</div></div>
      <div class="stat-chip"><div class="mfx-card-title">Total Payout</div><div class="val" id="stPayout">—</div></div>
      <div class="stat-chip"><div class="mfx-card-title">Net P&L</div><div class="val" id="stPnl">—</div></div>
      <div class="stat-chip">
        <div class="mfx-card-title">Win Rate</div>
        <div class="val" id="stWinRate">—</div>
        <div class="win-bar"><div class="win-fill" id="stWinBar" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="mfx-card" style="margin-bottom:16px;">
      <div class="filter-row">
        <div class="field-group">
          <label class="field-label">Action</label>
          <select class="mfx-select" id="fAction">
            <option value="">All</option>
            <option value="buy">Buy</option>
            <option value="sell">Sell</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Limit</label>
          <select class="mfx-select" id="fLimit">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="loadStatement()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Load
        </button>
        <button class="btn btn-secondary" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>
    </div>

    <!-- Profit chart -->
    <div class="mfx-card" style="margin-bottom:16px;">
      <div class="mfx-card-title">Cumulative P&L</div>
      <canvas id="pnlChart" style="height:160px;width:100%;display:block;"></canvas>
    </div>

    <!-- Table -->
    <div class="mfx-card">
      <div class="statement-wrap">
        <div id="stTable"><div class="mfx-loader"><div class="spin"></div>Loading statement...</div></div>
      </div>
    </div>
  </main>
</div>

<script>
const active = requireAuth();
document.getElementById('navHolder').innerHTML = buildNav('analytics');
document.getElementById('sidebarHolder').innerHTML = buildSidebar('analytics');

const ws = new DerivWS();
let allTx = [];

ws.connect(active.token);
ws.on('authorize', () => loadStatement());

async function loadStatement() {
  document.getElementById('stTable').innerHTML = '<div class="mfx-loader"><div class="spin"></div>Loading...</div>';
  const action = document.getElementById('fAction').value;
  const limit = parseInt(document.getElementById('fLimit').value);

  const req = { statement: 1, limit, description: 1 };
  if (action) req.action_type = action;

  try {
    const res = await ws.send(req);
    allTx = res.statement?.transactions || [];
    renderTable(allTx);
    renderStats(allTx);
    renderPnlChart(allTx);
  } catch(e) {
    toast('Failed to load statement', 'error');
  }
}

function renderStats(txs) {
  const buys = txs.filter(t => t.action_type === 'buy');
  const sells = txs.filter(t => t.action_type === 'sell');
  const totalStake = buys.reduce((s,t) => s + Math.abs(t.amount), 0);
  const totalPayout = sells.reduce((s,t) => s + t.amount, 0);
  const pnl = totalPayout - totalStake;
  const wins = sells.filter(t => t.amount > 0).length;
  const winRate = sells.length ? (wins / sells.length * 100) : 0;

  document.getElementById('stTotal').textContent = txs.length;
  document.getElementById('stStake').textContent = fmt(totalStake);
  document.getElementById('stPayout').textContent = fmt(totalPayout);
  document.getElementById('stPnl').textContent = (pnl >= 0 ? '+' : '') + fmt(pnl);
  document.getElementById('stPnl').className = 'val ' + (pnl >= 0 ? 'up' : 'dn');
  document.getElementById('stWinRate').textContent = fmt(winRate, 1) + '%';
  document.getElementById('stWinBar').style.width = winRate + '%';
}

function renderTable(txs) {
  if (!txs.length) {
    document.getElementById('stTable').innerHTML = '<div class="mfx-loader">No transactions found</div>';
    return;
  }
  document.getElementById('stTable').innerHTML = `
    <table class="mfx-table">
      <thead><tr>
        <th>Date</th><th>Action</th><th>Contract</th><th>Amount</th><th>Balance After</th>
      </tr></thead>
      <tbody>${txs.map(t => {
        const isBuy = t.action_type === 'buy';
        return `<tr>
          <td style="color:var(--muted);font-size:0.68rem">${fmtTime(t.transaction_time)}</td>
          <td><span class="tag ${isBuy?'tag-red':'tag-green'}">${t.action_type}</span></td>
          <td style="font-size:0.72rem;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.longcode||'—'}</td>
          <td class="${isBuy?'dn':'up'}" style="font-family:var(--font-display);font-weight:600">
            ${isBuy?'-':'+'}${fmt(Math.abs(t.amount))}
          </td>
          <td>${fmt(t.balance_after)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

function renderPnlChart(txs) {
  const canvas = document.getElementById('pnlChart');
  const sorted = [...txs].reverse();
  let cumulative = 0;
  const points = sorted.map(t => {
    cumulative += t.amount;
    return cumulative;
  });
  if (points.length < 2) return;
  const w = canvas.offsetWidth; const h = 160;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const min = Math.min(0, ...points); const max = Math.max(0, ...points);
  const range = max - min || 1;
  ctx.clearRect(0, 0, w, h);

  // Zero line
  const zeroY = h - ((0 - min) / range) * (h - 20) - 5;
  ctx.strokeStyle = '#1a2330'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(0, zeroY); ctx.lineTo(w, zeroY); ctx.stroke();
  ctx.setLineDash([]);

  const color = points[points.length-1] >= 0 ? '#00e5b4' : '#ff4060';
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = (i / (points.length - 1)) * w;
    const y = h - ((p - min) / range) * (h - 20) - 5;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '30'); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fill();
}

function exportCSV() {
  if (!allTx.length) { toast('No data to export', 'error'); return; }
  const headers = ['Date', 'Action', 'Contract', 'Amount', 'Balance After'];
  const rows = allTx.map(t => [
    fmtTime(t.transaction_time),
    t.action_type,
    `"${(t.longcode||'').replace(/"/g,'""')}"`,
    t.amount,
    t.balance_after
  ].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'manoofx_statement.csv';
  a.click(); URL.revokeObjectURL(url);
  toast('CSV exported!', 'success');
}
</script>
</body>
</html>
