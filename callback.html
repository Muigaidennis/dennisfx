<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ManooFX — Connecting...</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#080c10;--accent:#00e5b4;--text:#e8edf2;--muted:#5a6a7a;--danger:#ff4060;--border:#1a2330;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:24px;}
  .logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;}
  .logo span{color:var(--accent);}
  .spinner{width:40px;height:40px;border:2px solid var(--muted);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .msg{font-size:0.78rem;color:var(--muted);letter-spacing:0.08em;text-align:center;}
  .steps{font-size:0.68rem;color:var(--muted);text-align:left;max-width:280px;line-height:2;}
  .step{padding:2px 0;transition:color 0.2s;}
  .step.done{color:var(--accent);}
  .step.active{color:var(--text);font-weight:600;}
  .err{color:var(--danger);font-size:0.75rem;text-align:center;max-width:360px;line-height:1.8;background:rgba(255,64,96,0.06);border:1px solid rgba(255,64,96,0.2);border-radius:12px;padding:16px;display:none;word-break:break-all;}
</style>
</head>
<body>
<div class="logo">Manoo<span>FX</span></div>
<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">Authenticating with Deriv...</div>
<div class="steps" id="steps">
  <div class="step active" id="s1">① Receiving auth code</div>
  <div class="step" id="s2">② Exchanging for token</div>
  <div class="step" id="s3">③ Loading accounts</div>
  <div class="step" id="s4">④ Redirecting to dashboard</div>
</div>
<div class="err" id="errBox"></div>

<script>
const CLIENT_ID = '33scAN1TBU9sHqZPKckm9';
const REDIRECT  = 'https://dennisfx-82td.vercel.app/callback.html';

function setStep(n) {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('s' + i);
    if (i < n) el.className = 'step done';
    else if (i === n) el.className = 'step active';
    else el.className = 'step';
  }
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('msg').style.display = 'none';
  document.getElementById('steps').style.display = 'none';
  const errBox = document.getElementById('errBox');
  errBox.style.display = 'block';
  errBox.innerHTML = `<strong>Login Failed</strong><br><br>${msg}<br><br><a href="index.html" style="color:var(--accent);">← Try Again</a>`;
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const state  = params.get('state');
  const error  = params.get('error');

  if (error) { showError('Deriv error: ' + (params.get('error_description') || error)); return; }
  if (!code) { showError('No authorization code received. Please try again.'); return; }

  setStep(1);

  const savedState   = sessionStorage.getItem('oauth_state');
  const codeVerifier = sessionStorage.getItem('pkce_code_verifier');

  if (savedState && state !== savedState) {
    showError('Security check failed. Please try logging in again.');
    return;
  }

  // Step 2: Exchange code for token
  setStep(2);
  document.getElementById('msg').textContent = 'Exchanging token...';

  try {
    const tokenRes = await fetch('/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        code,
        code_verifier: codeVerifier,
        redirect_uri:  REDIRECT
      })
    });

    // Get raw response text first for debugging
    const rawText = await tokenRes.text();
    let tokenData;
    try {
      tokenData = JSON.parse(rawText);
    } catch(e) {
      showError('API response error:<br>' + rawText.slice(0, 300));
      return;
    }

    if (!tokenRes.ok || tokenData.error) {
      showError(
        'Token exchange failed (HTTP ' + tokenRes.status + '):<br>' +
        (tokenData.error_description || tokenData.error || tokenData.message || rawText.slice(0,200))
      );
      return;
    }

    const accessToken = tokenData.access_token;
    if (!accessToken) {
      showError('No access token in response:<br>' + JSON.stringify(tokenData).slice(0,300));
      return;
    }

    // Step 3: Get accounts
    setStep(3);
    document.getElementById('msg').textContent = 'Loading your accounts...';

    let accounts = [];
    try {
      const acctRes = await fetch('https://api.derivws.com/trading/v1/options/accounts', {
        headers: {
          'Authorization': 'Bearer ' + accessToken,
          'Deriv-App-ID':  CLIENT_ID
        }
      });
      if (acctRes.ok) {
        const acctData = await acctRes.json();
        const acctList = acctData.data?.accounts || acctData.accounts || [];
        accounts = acctList.map(a => ({
          account:  a.loginid || a.account_id,
          token:    accessToken,
          currency: a.currency,
          type:     a.account_type
        }));
      }
    } catch(e) {}

    // Fallback
    if (!accounts.length) {
      accounts = [{
        account:  tokenData.loginid || 'account',
        token:    accessToken,
        currency: 'USD',
        type:     'real'
      }];
    }

    // Step 4: Save and redirect
    setStep(4);
    document.getElementById('msg').textContent = 'Welcome! Loading dashboard...';

    localStorage.setItem('mfx_accounts', JSON.stringify(accounts));
    localStorage.setItem('mfx_access_token', accessToken);

    const demo   = accounts.find(a => a.account?.startsWith('VRTC'));
    const active = demo || accounts[0];
    localStorage.setItem('mfx_active', JSON.stringify(active));

    if (!localStorage.getItem('mfx_admin_id')) {
      localStorage.setItem('mfx_admin_id', accounts[0].account);
    }

    sessionStorage.removeItem('pkce_code_verifier');
    sessionStorage.removeItem('oauth_state');

    setTimeout(() => location.href = 'dashboard.html', 1000);

  } catch(e) {
    showError('Network error: ' + e.message);
  }
}

handleCallback();
</script>
</body>
</html>
