<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ManooFX — Connecting...</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=DM+Mono:wght@400&amp;display=swap" rel="stylesheet">
<style>
  :root{--bg:#080c10;--accent:#00e5b4;--text:#e8edf2;--muted:#5a6a7a;--danger:#ff4060;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:\'DM Mono\',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:24px;}
  .logo{font-family:\'Syne\',sans-serif;font-size:1.5rem;font-weight:800;}
  .logo span{color:var(--accent);}
  .spinner{width:40px;height:40px;border:2px solid var(--muted);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .msg{font-size:0.78rem;color:var(--muted);letter-spacing:0.08em;text-align:center;}
</style>
</head>
<body>
<div class="logo">Manoo<span>FX</span></div>
<div class="spinner"></div>
<div class="msg" id="msg">Processing your login...</div>

<script>
async function handleCallback() {
  const urlParams = new URLSearchParams(window.location.search); // For query parameters
  const hashParams = new URLSearchParams(window.location.hash.substring(1)); // For hash fragment
  
  const accounts = [];
  
  // Check query parameters first (for implicit grant with response_type=token, tokens are usually in hash)
  // But Deriv's legacy docs show them in query, so check both.
  let foundInQuery = false;
  for (let i = 1; i <= 10; i++) {
    const acc = urlParams.get(\'acct\' + i);
    const tok = urlParams.get(\'token\' + i);
    const cur = urlParams.get(\'cur\' + i);
    if (acc && tok) {
      accounts.push({ 
        account: acc, 
        token: tok, 
        currency: cur || \'USD\', 
        type: acc.startsWith(\'VRTC\') ? \'demo\' : \'real\' 
      });
      foundInQuery = true;
    }
  }

  // If not found in query, check hash fragment (standard for implicit grant)
  if (!foundInQuery) {
    for (let i = 1; i <= 10; i++) {
      const acc = hashParams.get(\'acct\' + i);
      const tok = hashParams.get(\'token\' + i);
      const cur = hashParams.get(\'cur\' + i);
      if (acc && tok) {
        accounts.push({ 
          account: acc, 
          token: tok, 
          currency: cur || \'USD\', 
          type: acc.startsWith(\'VRTC\') ? \'demo\' : \'real\' 
        });
      }
    }
  }

  if (accounts.length > 0) {
    document.getElementById(\'msg\').textContent = `Found ${accounts.length} accounts. Redirecting...`;
    
    // Save to localStorage
    localStorage.setItem(\'mfx_accounts\', JSON.stringify(accounts));
    
    // Set the first demo account as active by default, or the first real if no demo
    const demo = accounts.find(a => a.account.startsWith(\'VRTC\'));
    const active = demo || accounts[0];
    
    localStorage.setItem(\'mfx_active\', JSON.stringify(active));
    localStorage.setItem(\'mfx_access_token\', active.token);

    // Redirect to dashboard
    setTimeout(() => {
      window.location.href = \'dashboard.html\';
    }, 1000);
  } else {
    document.getElementById(\'msg\').innerHTML = `<span style="color:#ff4060">Login failed: No account information received.</span><br><br><a href="index.html" style="color:var(--accent);text-decoration:none;">← Try Again</a>`;
    console.error("No account parameters found in URL:", window.location.search + window.location.hash);
  }
}

handleCallback();
</script>
</body></html>
