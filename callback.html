<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ManooFX — Connecting...</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=DM+Mono:wght@400&amp;display=swap" rel="stylesheet">
<style>
  :root{--bg:#080c10;--accent:#00e5b4;--text:#e8edf2;--muted:#5a6a7a;}
  body{background:var(--bg);color:var(--text);font-family:\'DM Mono\',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
  .spinner{width:40px;height:40px;border:3px solid var(--muted);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="logo" style="font-family:\'Syne\'; font-weight:800; font-size:1.5rem;">Manoo<span>FX</span></div>
<div class="spinner"></div>
<div id="status" style="font-size:0.8rem; color:var(--muted);">Processing Deriv Login...</div>

<script>
async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const accounts = [];
  
  // Deriv redirects with parameters like acct1, token1, cur1, acct2, token2, etc.
  for (let i = 1; i <= 10; i++) {
    const acc = params.get(\'acct\' + i);
    const tok = params.get(\'token\' + i);
    const cur = params.get(\'cur\' + i);
    if (acc && tok) {
      accounts.push({ 
        account: acc, 
        token: tok, 
        currency: cur || \'USD\', 
        type: acc.startsWith(\'VRTC\') ? \'demo\' : \'real\' 
      });
    }
  }

  if (accounts.length > 0) {
    document.getElementById(\'status\').textContent = `Found ${accounts.length} accounts. Redirecting...`;
    
    // Save all accounts
    localStorage.setItem(\'mfx_accounts\', JSON.stringify(accounts));
    
    // Set the first demo account as active by default, or the first real if no demo
    const demo = accounts.find(a => a.account.startsWith(\'VRTC\'));
    const active = demo || accounts[0];
    
    localStorage.setItem(\'mfx_active\', JSON.stringify(active));
    localStorage.setItem(\'mfx_access_token\', active.token);

    // Give it a small delay to ensure storage is written
    setTimeout(() => {
      window.location.href = \'dashboard.html\';
    }, 1500);
  } else {
    document.getElementById(\'status\').innerHTML = `<span style="color:#ff4060">No accounts found in redirect.</span><br><br><a href="index.html" style="color:var(--accent)">Go Back</a>`;
    console.error("No account parameters found in URL:", window.location.search);
  }
}

handleCallback();
</script>
</body></html>
