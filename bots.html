<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ManooFX — Bot Manager</title>
<link rel="stylesheet" href="shared.css"/>
<script src="shared.js"></script>
<style>
  .bot-card {
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color 0.15s;
  }
  .bot-card:hover { border-color:var(--border2); }
  .bot-name { font-family:var(--font-display);font-size:1rem;font-weight:700; }
  .bot-desc { font-size:0.72rem;color:var(--muted);line-height:1.5; }
  .bot-meta { display:flex;gap:10px;flex-wrap:wrap; }
  .bot-stat { font-size:0.68rem;color:var(--muted); }
  .bot-stat strong { color:var(--text);font-size:0.75rem; }
  .bot-actions { display:flex;gap:8px;flex-wrap:wrap;margin-top:4px; }
  .open-btn {
    flex:1;padding:12px;border:none;border-radius:var(--radius-sm);
    background:var(--accent);color:#000;font-family:var(--font-display);
    font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .open-btn:hover { background:#00ffca; }
  .empty-state {
    text-align:center;padding:48px 24px;color:var(--muted);font-size:0.78rem;
  }
  .empty-icon { font-size:2.5rem;margin-bottom:12px; }

  /* Admin upload panel */
  .admin-panel {
    background:rgba(0,229,180,0.04);border:1px solid rgba(0,229,180,0.15);
    border-radius:var(--radius);padding:16px;margin-bottom:16px;
  }
  .admin-panel-title {
    font-family:var(--font-display);font-size:0.85rem;font-weight:700;
    color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px;
  }
  .upload-zone {
    border:2px dashed var(--border);border-radius:var(--radius);
    padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;
    color:var(--muted);font-size:0.75rem;
  }
  .upload-zone:hover,.upload-zone.drag { border-color:var(--accent);color:var(--accent);background:rgba(0,229,180,0.04); }
  .upload-icon { font-size:1.8rem;margin-bottom:6px; }
</style>
</head>
<body>
<div id="navHolder"></div>
<div class="mfx-layout">
  <div id="sidebarHolder"></div>
  <main class="mfx-main">
    <div class="page-header">
      <div>
        <div class="page-title">Bot Manager</div>
        <div class="page-sub">Select a bot to open in builder</div>
      </div>
    </div>

    <!-- ADMIN UPLOAD PANEL — only visible to admin -->
    <div class="admin-panel" id="adminUploadPanel" style="display:none;">
      <div class="admin-panel-title">🔒 Admin — Upload Bot for Users</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div>
          <label class="field-label">Bot Name</label>
          <input class="mfx-input" id="uploadName" placeholder="e.g. Even/Odd Strategy v2"/>
        </div>
        <div>
          <label class="field-label">Description</label>
          <input class="mfx-input" id="uploadDesc" placeholder="Short description for users..."/>
        </div>
        <div>
          <label class="field-label">Category</label>
          <select class="mfx-select" id="uploadCategory">
            <option value="digits">Digits (Even/Odd/Over/Under)</option>
            <option value="updown">Rise/Fall</option>
            <option value="martingale">Martingale</option>
            <option value="dalembert">D'Alembert</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div
          class="upload-zone" id="uploadZone"
          onclick="document.getElementById('botXmlFile').click()"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="handleAdminDrop(event)">
          <div class="upload-icon">📂</div>
          <div id="uploadZoneText">Drop Deriv Bot XML here or tap to browse</div>
        </div>
        <input type="file" id="botXmlFile" accept=".xml" style="display:none" onchange="handleAdminFile(event)"/>
        <div id="xmlPreview" style="display:none;background:var(--surface);border-radius:var(--radius-sm);padding:10px;font-size:0.65rem;color:var(--muted);max-height:80px;overflow:auto;"></div>
        <button class="btn btn-primary" onclick="adminUploadBot()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Bot for All Users
        </button>
      </div>
    </div>

    <!-- BOT LIST -->
    <div id="botList" style="display:flex;flex-direction:column;gap:12px;"></div>

  </main>
</div>
<div id="bottomNavHolder"></div>

<script>
const active = requireAuth();
document.getElementById("navHolder").innerHTML = buildNav("bots");
document.getElementById("sidebarHolder").innerHTML = buildSidebar("bots");
document.getElementById("bottomNavHolder").innerHTML = buildBottomNav("bots");

const adminId = localStorage.getItem("mfx_admin_id");
const isAdminUser = isAdmin();

// Show admin upload panel if admin
if (isAdminUser) {
  document.getElementById("adminUploadPanel").style.display = "block";
}

let uploadedXml = null;

function handleAdminFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  readXmlFile(file);
}

function handleAdminDrop(e) {
  e.preventDefault();
  document.getElementById("uploadZone").classList.remove("drag");
  const file = e.dataTransfer.files[0];
  if (file) readXmlFile(file);
}

function readXmlFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    uploadedXml = ev.target.result;
    document.getElementById("uploadZoneText").textContent = "✓ " + file.name + " loaded";
    document.getElementById("uploadZone").style.borderColor = "var(--accent)";
    document.getElementById("xmlPreview").style.display = "block";
    document.getElementById("xmlPreview").textContent = uploadedXml.slice(0, 300) + "...";
    toast("XML loaded: " + file.name, "success");
  };
  reader.readAsText(file);
}

function adminUploadBot() {
  const name = document.getElementById("uploadName").value.trim();
  const desc = document.getElementById("uploadDesc").value.trim();
  const category = document.getElementById("uploadCategory").value;
  if (!name) { toast("Enter a bot name", "error"); return; }
  if (!uploadedXml) { toast("Upload an XML file first", "error"); return; }

  const bots = JSON.parse(localStorage.getItem("mfx_admin_bots") || "[]");
  bots.push({
    id: "abot_" + Date.now(),
    name, desc, category,
    xml: uploadedXml,
    uploadedAt: new Date().toISOString(),
    uploadedBy: active.account
  });
  localStorage.setItem("mfx_admin_bots", JSON.stringify(bots));
  toast("Bot uploaded for all users!", "success");

  // Reset form
  document.getElementById("uploadName").value = "";
  document.getElementById("uploadDesc").value = "";
  uploadedXml = null;
  document.getElementById("uploadZoneText").textContent = "Drop Deriv Bot XML here or tap to browse";
  document.getElementById("uploadZone").style.borderColor = "";
  document.getElementById("xmlPreview").style.display = "none";

  renderBots();
}

function renderBots() {
  const list = document.getElementById("botList");
  const bots = JSON.parse(localStorage.getItem("mfx_admin_bots") || "[]");

  if (!bots.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🤖</div>
      <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;">No bots available yet</div>
      <div>${isAdminUser ? "Upload a bot above to make it available for users." : "Check back later — the admin will upload bots soon."}</div>
    </div>`;
    return;
  }

  const catColors = {
    digits: "tag-green", updown: "tag-blue",
    martingale: "tag-warn", dalembert: "tag-blue", custom: "tag-red"
  };
  const catLabels = {
    digits: "Digits", updown: "Rise/Fall",
    martingale: "Martingale", dalembert: "D'Alembert", custom: "Custom"
  };

  list.innerHTML = bots.map(bot => `
    <div class="bot-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
        <div>
          <div class="bot-name">${bot.name}</div>
          <div class="bot-desc">${bot.desc || "No description"}</div>
        </div>
        <span class="tag ${catColors[bot.category]||"tag-blue"}">${catLabels[bot.category]||bot.category}</span>
      </div>
      <div class="bot-meta">
        <div class="bot-stat"><span>Uploaded: </span><strong>${new Date(bot.uploadedAt).toLocaleDateString()}</strong></div>
        <div class="bot-stat"><span>By: </span><strong>${bot.uploadedBy||"Admin"}</strong></div>
      </div>
      <div class="bot-actions">
        <button class="open-btn" onclick="openInBuilder('${bot.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Open in Builder
        </button>
        ${isAdminUser ? `<button class="btn btn-danger" style="padding:8px 14px;" onclick="deleteBot('${bot.id}')">🗑</button>` : ""}
      </div>
    </div>`).join("");
}

function openInBuilder(botId) {
  // Store selected bot id and navigate to builder
  localStorage.setItem("mfx_selected_bot", botId);
  location.href = "botbuilder.html";
}

function deleteBot(botId) {
  if (!confirm("Delete this bot?")) return;
  let bots = JSON.parse(localStorage.getItem("mfx_admin_bots") || "[]");
  bots = bots.filter(b => b.id !== botId);
  localStorage.setItem("mfx_admin_bots", JSON.stringify(bots));
  renderBots();
  toast("Bot deleted", "info");
}

renderBots();
</script>
</body>
</html>
